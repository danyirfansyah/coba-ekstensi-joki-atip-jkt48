<script>
  try {
    const raw = sessionStorage.getItem("lastPurchase");
    if (raw) {
      const data = JSON.parse(raw);
      document.getElementById("summary").innerHTML =
        "<b>" + data.photobook + "</b><br>" +
        data.items.map((i) => i.member + " &middot; " + i.session + " &middot; " + i.qty + " tiket").join("<br>");
      sessionStorage.removeItem("lastPurchase");
    }
  } catch (e) {}
